<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariage Kévin & Anaïs</title>

<style>
body {margin:0;font-family:Georgia,serif;overflow:hidden;}

#curtain {
 position:fixed;
 width:100%;height:100%;
 background:white;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 z-index:10;
}

#main {
 display:none;
 background:url('chateau.jpg') no-repeat center/cover;
 min-height:100vh;
}

.overlay {
 background:rgba(255,255,255,0.92);
 min-height:100vh;
 padding:20px;
 text-align:center;
}

form {max-width:500px;margin:auto;text-align:left;}

input,select,textarea {
 width:100%;
 margin-top:10px;
 padding:10px;
 border-radius:8px;
 border:1px solid #ccc;
}

button {
 margin-top:15px;
 padding:12px;
 width:100%;
 border:none;
 border-radius:10px;
}
</style>
</head>

<body>

<div id="curtain" onclick="openCurtain()">
<h1>Ouvrir l'invitation</h1>
</div>

<div id="main">

<audio id="music" loop>
<source src="https://www.fesliyanstudios.com/play-mp3/387" type="audio/mpeg">
</audio>

<div class="overlay">

<h1>Kévin & Anaïs</h1>
<p>Ont la joie de vous inviter à leur mariage<br>17 juillet 2027</p>

<form action="mailto:Coignardanais@caramail.fr" method="post" enctype="text/plain">

<label>Prénom et Nom</label>
<input type="text" name="nom">

<label>Serez-vous présent ?</label>
<select name="presence">
<option>Oui</option>
<option>Non</option>
</select>

<label>Dormirez-vous sur place (45€ / nuit / personne) ?</label>
<select name="nuit">
<option>Oui</option>
<option>Non</option>
</select>

<label>Avez-vous des allergies ?</label>
<input type="text" name="allergies">

<label>Message pour les mariés</label>
<textarea name="message"></textarea>

<button type="submit">Envoyer</button>

</form>

</div>
</div>

<script>
function openCurtain(){
 document.getElementById('curtain').style.display='none';
 document.getElementById('main').style.display='block';
 document.getElementById('music').play();
}
</script>

</body>
</html>
